syntax = "proto3";

package tero.policy.v1;

option go_package = "github.com/usetero/policy/gen/go/tero/policy/v1";

// =============================================================================
// Extensions
// =============================================================================
//
// Extensions are a fully generic mechanism for attaching implementation-specific
// behavior to a policy. The policy engine matches telemetry using the core
// target (log/metric/trace), computes the final keep outcome, then dispatches
// selected records to the handler registered for the extension `type` before
// transforms run. All extension payloads are opaque bytes: the engine never
// interprets them, so any implementation can define its own extension types
// without changing the core schema.
//
// tero's own extension types (e.g. the s3-dump destination) live in
// tero_extensions.proto.

// ExtensionMode selects which slice of the telemetry stream the engine delivers
// to an extension, relative to its policy. {KEPT, DROPPED, UNMATCHED} are
// disjoint and partition the stream; MATCHED and ALL are convenience unions.
enum ExtensionMode {
  EXTENSION_MODE_UNSPECIFIED = 0; // treated as MATCHED

  // Matched the policy and survived the keep stage.
  EXTENSION_MODE_KEPT = 1;

  // Matched the policy but was removed by the keep stage (dropped, sampled out,
  // or rate limited). Its keep verdict is the record's final pipeline outcome,
  // which another matching policy may have caused. This is the "dump waste" mode.
  EXTENSION_MODE_DROPPED = 2;

  // Did not match the policy's matchers.
  EXTENSION_MODE_UNMATCHED = 3;

  // Matched the policy, regardless of keep outcome (KEPT + DROPPED). Default.
  EXTENSION_MODE_MATCHED = 4;

  // Every record of the signal type, regardless of match or keep
  // (KEPT + DROPPED + UNMATCHED).
  EXTENSION_MODE_ALL = 5;
}

// Extension attaches implementation-specific behavior to a policy.
//
// Implementations MUST declare which extension types they support. An extension
// with an unrecognized type is handled per the spec (fail-open, or reject policy
// load when the extension is required for the policy's behavior).
message Extension {
  // Type identifier using reverse-FQDN notation (e.g. "com.usetero/s3-dump").
  // Implementations use this to route to the correct handler.
  string type = 1;

  // Version of the extension schema (semver, e.g. "1.0.0").
  string version = 2;

  // Opaque, type-defined configuration payload, deserialized by the handler
  // registered for `type`. The policy engine does not interpret it.
  bytes config = 3;

  // Which slice of traffic the engine delivers to this extension. Defaults to
  // MATCHED.
  ExtensionMode mode = 4;
}

// ExtensionCapability declares a client's support for one extension type. The
// repeated `config` entries are opaque, type-defined capability descriptors —
// for example, the destinations the client can route to. The policy engine does
// not interpret them; the extension handler does. Providers use this to avoid
// sending policies whose extensions the client cannot satisfy.
message ExtensionCapability {
  // Extension type identifier (e.g. "com.usetero/s3-dump").
  string type = 1;

  // Minimum supported extension version (semver, inclusive).
  string min_version = 2;

  // Opaque, type-defined capability descriptors. For tero's s3-dump these are
  // serialized ExtensionTargetRefs (see tero_extensions.proto).
  repeated bytes config = 3;
}

// ExtensionConfig broadcasts opaque, type-defined configuration for one
// extension type to clients (via SyncResponse.extension_configs). Each `config`
// entry is parsed by the handler registered for `type`. For tero's s3-dump
// these are serialized ExtensionTargets (see tero_extensions.proto).
message ExtensionConfig {
  // Extension type identifier (e.g. "com.usetero/s3-dump").
  string type = 1;

  // Opaque, type-defined configuration payloads.
  repeated bytes config = 2;
}
