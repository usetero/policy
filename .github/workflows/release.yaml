---
# Publish to Buf Registry Workflow
#
# Why this exists:
# Automates publishing the proto module to buf.build when a GitHub release is created.
#
# What it does:
# - Triggers when a GitHub release is published (via release-please)
# - Sets up hermit for buf CLI
# - Publishes to buf.build/tero/policy
#
# Requirements:
# - BUF_TOKEN secret must be set with a buf.build API token
name: release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.TERO_BOT_CLIENT_ID }}
          private-key: ${{ secrets.TERO_BOT_PRIVATE_SIGNING_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - run: git config --global url.https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/.insteadOf https://github.com/

      - uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # v1.1.4

      - name: Setup CI dependencies
        run: task ci:setup

      - name: Verify buf is available
        run: buf --version

      - name: Lint
        run: task lint

      - name: Build
        run: task build

      - name: Publish to Buf Registry
        run: |
          buf push --label ${{ github.event.release.tag_name }}
          buf push --label main
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
