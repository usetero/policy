id: redact-password-query-param
name: Redact password query parameter in log body

log:
  match:
    - log_field: LOG_FIELD_BODY
      regex: "password="
  transform:
    redact:
      - log_field: LOG_FIELD_BODY
        regex: '([?&]password=)[^&\s]+(&session_id=)'
        replacement: "$1[REDACTED]$2"
